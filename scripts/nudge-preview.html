<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdUsaathiAI — Nudge Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0B1F3A;
      --gold: #C9993A;
      --cream: #FAF6F0;
      --white: #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      padding: 32px 20px 60px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .logo span { color: var(--gold); }
    .subtitle {
      font-size: 13px;
      color: #7a8a9a;
      letter-spacing: 0.04em;
    }

    /* ── Category tabs ── */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
      max-width: 680px;
      margin-inline: auto;
    }
    .tab {
      background: white;
      border: 1.5px solid #d0dae8;
      border-radius: 99px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--navy);
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
    }
    .tab:hover { border-color: var(--gold); color: var(--gold); }
    .tab.active {
      background: var(--navy);
      border-color: var(--navy);
      color: white;
    }
    .tab.all.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--navy);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      max-width: 980px;
      margin: 0 auto;
    }

    /* ── Nudge Card ── */
    .card {
      background: var(--navy);
      border-radius: 22px;
      padding: 24px 22px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(201,153,58,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(11,31,58,0.18);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nudge-id {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 2px 8px;
      letter-spacing: 0.03em;
    }
    .cat-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--gold);
      background: rgba(201,153,58,0.14);
      border-radius: 6px;
      padding: 2px 10px;
    }
    .tone-badge {
      font-size: 10px;
      font-weight: 500;
      border-radius: 6px;
      padding: 2px 8px;
      margin-left: auto;
    }
    .tone-funny    { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .tone-logical  { background: rgba(96,165,250,0.15); color: #60a5fa; }
    .tone-emotional{ background: rgba(167,139,250,0.15); color: #a78bfa; }
    .tone-urgent   { background: rgba(248,113,113,0.15); color: #f87171; }

    .hindi-text {
      font-family: 'Playfair Display', serif;
      font-size: 19px;
      color: white;
      line-height: 1.5;
      white-space: pre-line;
    }
    .english-text {
      font-size: 12.5px;
      color: rgba(255,255,255,0.55);
      font-style: italic;
      line-height: 1.6;
    }
    .cta-row {
      margin-top: 4px;
      background: var(--gold);
      color: var(--navy);
      font-weight: 700;
      font-size: 13px;
      border-radius: 10px;
      padding: 10px 14px;
      text-align: center;
    }

    /* Tags */
    .tags {
      display: flex; flex-wrap: wrap; gap: 5px;
    }
    .tag {
      font-size: 10px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.45);
      border-radius: 5px;
      padding: 2px 8px;
    }

    /* Empty state */
    .empty {
      text-align: center;
      color: #9aabb8;
      grid-column: 1/-1;
      padding: 60px 20px;
      font-size: 15px;
    }

    /* Counter */
    .counter {
      text-align: center;
      font-size: 12px;
      color: #9aabb8;
      margin-bottom: 18px;
      margin-top: -10px;
    }
    .counter strong { color: var(--navy); }
  </style>

const grid = document.getElementById('grid');
const counter = document.getElementById('counter');
let activeFilter = 'all';

function render(filter) {
  activeFilter = filter;
  const filtered = filter === 'all' ? NUDGES : NUDGES.filter(n => n.category === filter);

  counter.innerHTML = `<strong>${filtered.length}</strong> nudge${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No nudges in this category.</div>';
    return;
  }

  grid.innerHTML = filtered.map(n => `
    <div class="card">
      <div class="card-top">
        <span class="nudge-id">#${n.id}</span>
        <span class="cat-badge">${n.categoryLabel}</span>
        <span class="tone-badge tone-${n.tone}">${n.tone}</span>
      </div>
      <div class="hindi-text">${n.hindi.replace(/\[Name\]/g, 'Arjun').replace(/\[Days\]/g, '18')}</div>
      <div class="english-text">${n.english.replace(/\[Days\]/g, '18')}</div>
      <div class="cta-row">${n.cta}</div>
      <div class="tags">
        ${n.triggers.map(t => `<span class="tag">${t}</span>`).join('')}
        ${n.cities.map(c => `<span class="tag">📍${c}</span>`).join('')}
        ${n.exams.map(e => `<span class="tag">🎯${e}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('[data-cat]');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  render(tab.dataset.cat);
});

render('all');
